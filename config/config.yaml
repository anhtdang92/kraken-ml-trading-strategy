# Stock ML Trading Dashboard Configuration

# Stock universe to monitor and trade
# v2.0: Removed redundant broad index ETFs (SPY/QQQ/DIA) and ARKK.
# Added defensive consumer staples, bond/gold ETFs, and small-cap value.
trading:
  # FAANG+ Tech Leaders
  tech_stocks:
    - AAPL   # Apple
    - MSFT   # Microsoft
    - GOOGL  # Alphabet
    - AMZN   # Amazon
    - NVDA   # NVIDIA
    - META   # Meta Platforms
    - TSLA   # Tesla

  # Sector Leaders (top picks per sector)
  sector_leaders:
    - JPM    # Financials - JPMorgan Chase
    - UNH    # Healthcare - UnitedHealth
    - XOM    # Energy - ExxonMobil
    - CAT    # Industrials - Caterpillar
    - PG     # Consumer Staples - Procter & Gamble
    - HD     # Consumer Discretionary - Home Depot
    - NEE    # Utilities - NextEra Energy
    - AMT    # Real Estate - American Tower
    - LIN    # Materials - Linde

  # Defensive Consumer Staples (crash protection, stable dividends)
  defensive_stocks:
    - JNJ    # Johnson & Johnson - Healthcare
    - KO     # Coca-Cola - Consumer Staples
    - PEP    # PepsiCo - Consumer Staples
    - MCD    # McDonald's - Consumer Staples

  # ETFs - Sector, Small Cap, Bonds, Commodities (no broad index overlap)
  etfs:
    - IWM    # Russell 2000 (Small Cap)
    - IJR    # S&P 600 Small Cap Value
    - XLK    # Technology Sector
    - XLF    # Financial Sector
    - XLE    # Energy Sector
    - XLV    # Healthcare Sector
    - TLT    # 20+ Year Treasury Bonds (crash hedge)
    - GLD    # Gold (inflation hedge, crisis safe haven)

  # Growth Stocks (speculative - capped at 2% each except CRWD/SQ)
  growth_stocks:
    - PLTR   # Palantir (capped 2%)
    - CRWD   # CrowdStrike
    - SNOW   # Snowflake (capped 2%)
    - SQ     # Block (Square)
    - COIN   # Coinbase (capped 2%)

  # Rebalancing schedule
  rebalance_day: "Friday"       # End of trading week
  rebalance_hour: 15             # 3 PM ET (before market close)
  rebalance_timezone: "America/New_York"

  # Initial portfolio
  initial_capital: 25000.0  # USD

  # Risk management
  max_position_size: 0.10    # 10% max per stock (reduced from 15%)
  min_position_size: 0.02    # 2% min per stock
  min_trade_amount: 100.0    # Minimum $100 per trade
  max_single_trade: 5000.0   # Maximum $5000 per trade
  cash_reserve_pct: 0.05     # Hold 5% cash reserve at all times

  # Position-level stop-loss
  stop_loss_pct: -0.08       # Sell if individual position drops 8%

  # Portfolio-level drawdown circuit breaker
  max_portfolio_drawdown: -0.12  # Halt all trading if portfolio drops 12% from peak

  # Sector exposure limits (prevent overconcentration)
  sector_limits:
    Technology: 0.25           # Max 25% in tech (AAPL+MSFT+GOOGL+AMZN+NVDA+META+TSLA+PLTR+CRWD+SNOW)
    Financials: 0.15
    Healthcare: 0.15
    Energy: 0.12
    Consumer Staples: 0.15
    Industrials: 0.10
    Utilities: 0.08
    Real Estate: 0.08
    Materials: 0.08

  # Trading mode
  paper_trading: true  # Set to false for live trading (BE CAREFUL!)

# ML Model Configuration
ml:
  model_type: "LSTM"

  # Model presets (choose one):
  #   base:        2-layer LSTM(64), ~6K params — runs on CPU
  #   gpu:         3-layer BiLSTM(256) + Attention, ~1.2M params — RTX 3060+
  #   gpu_max:     4-layer BiLSTM(512) + Attention + Conv1D, ~5M params — RTX 4090
  #   transformer: 6-layer Transformer Encoder (d=256, 8 heads), ~3M params — RTX 4090
  model_preset: "gpu"

  # LSTM architecture (base preset — overridden by gpu presets)
  lstm:
    layers: 2
    units: 64
    dropout: 0.2

  # GPU architecture (gpu / gpu_max presets)
  lstm_gpu:
    layers: 3                  # 4 for gpu_max
    units: 256                 # 512 for gpu_max
    dropout: 0.3               # 0.35 for gpu_max
    bidirectional: true
    attention_heads: 4         # 8 for gpu_max
    conv_filters: 0            # 128 for gpu_max
    mixed_precision: true      # Use float16 on Tensor Cores
    ensemble_size: 5           # Number of models for ensemble prediction

  # Training parameters - Position trading (weeks-months)
  training:
    lookback_days: 60          # 60 for GPU models, 30 for base
    prediction_horizon: 21    # Predict 21 trading days ahead (~1 month)
    train_val_split: 0.8      # 80% train, 20% validation
    batch_size: 256            # 256 for GPU, 512 for gpu_max, 32 for base
    epochs: 300                # More epochs with cosine annealing + early stopping
    early_stopping_patience: 25

  # Feature engineering
  features:
    moving_averages: [10, 20, 50, 200]
    use_rsi: true
    use_macd: true
    use_bollinger: true
    use_volume_indicators: true
    use_momentum: true
    use_earnings_proximity: true

# Data fetching
data:
  source: "yfinance"       # Primary data source (free, no API key)
  backup_source: "none"

  # Historical data
  historical_days: 730  # Fetch 2 years of historical data

  # Update schedule
  update_frequency: "daily"
  update_hour: 18  # 6 PM ET (after market close)

# Google Cloud Platform
gcp:
  region: "us-central1"
  project_id: "stock-ml-trading-487"

  # BigQuery
  bigquery:
    dataset: "stock_data"
    tables:
      historical_prices: "historical_prices"
      predictions: "predictions"
      trades: "trades"
      model_metrics: "model_metrics"

  # Cloud Storage
  storage:
    models_bucket: "stock-ml-models-487"
    backups_bucket: "stock-ml-backups-487"

  # Vertex AI
  vertex_ai:
    machine_type: "n1-standard-4"
    use_preemptible: true

# Streamlit Dashboard
dashboard:
  title: "ATLAS - Stock ML Intelligence Dashboard"
  refresh_interval: 300  # 5 minutes
  cache_ttl: 300

  # Display settings
  display:
    currency: "USD"
    decimal_places: 2
    use_dark_mode: true

# Logging
logging:
  level: "INFO"
  format: "json"
  log_to_bigquery: true

# Notifications
notifications:
  enabled: true
  channels:
    - "email"
  notify_on:
    - "trade_execution"
    - "model_training_complete"
    - "api_errors"
    - "weekly_summary"
    - "earnings_alert"
